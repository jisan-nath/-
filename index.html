<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shrikrishna</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#1e293b,#0f172a);
    color:white;
    overflow:hidden;
}

.glow{
    position:absolute;
    width:400px;
    height:400px;
    background:#22c55e;
    filter:blur(150px);
    opacity:0.3;
    animation:move 6s infinite alternate;
}

@keyframes move{
    from{transform:translate(-100px,-100px);}
    to{transform:translate(100px,100px);}
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{font-size:24px;margin-bottom:10px;}

p{font-size:13px;opacity:0.7;}

.links a{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.07);
    transition:0.3s;
}

.links a:hover{
    background:#22c55e;
    transform:scale(1.05);
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    outline:none;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    width:100%;
    transition:0.3s;
}

button:hover{background:#16a34a;}

#qrcode{
    margin-top:15px;
    display:flex;
    justify-content:center;
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="card">
    <h1>⚡ My Links</h1>
    <p>Simple • Fast • Modern</p>

    <div class="links">
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
    </div>

    <h3 style="margin-top:15px;">QR Generator</h3>

    <input id="text" placeholder="Paste any link...">
    <button onclick="makeQR()">Generate QR</button>

    <div id="qrcode"></div>
</div>

<script>
function makeQR(){
    let qr = document.getElementById("qrcode");
    qr.innerHTML = "";
    let value = document.getElementById("text").value;

    if(!value) return;

    new QRCode(qr, {
        text: value,
        width: 180,
        height: 180
    });
}
</script>

</body>
</html>
